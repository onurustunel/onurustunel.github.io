baseURL = "https://onurustunel.github.io/"
languageCode = "en-us"
title = "Onur Ustunel"
theme = "PaperMod"
enableRobotsTXT = true
summaryLength = 24

[pagination]
pagerSize = 4

[outputs]
home = ["HTML", "RSS", "JSON"]

[markup.goldmark.renderer]
unsafe = true

[markup.highlight]
noClasses = false
guessSyntax = true
lineNos = false
style = "github"

[params]
env = "production"
author = "Onur Ustunel"
description = "Writing about the engineering thinking behind products, product ideas, systems, and software tradeoffs."
keywords = ["Swift", "SwiftUI", "iOS", "Architecture", "Performance"]
defaultTheme = "light"
disableThemeToggle = false
ShowReadingTime = true
ShowWordCount = false
ShowShareButtons = false
ShowPostNavLinks = true
ShowBreadCrumbs = false
ShowCodeCopyButtons = true
ShowRssButtonInSectionTermList = false
ShowToc = false
mainSections = ["posts"]
DateFormat = "2 January 2006"
homeRecentTitle = "Recent"

[params.profileMode]
title = "Onur Ustunel"
subtitle = "Engineering Thinking Behind Products"
avatarInitials = "OU"

[params.assets]
theme_color = "#f3f3f1"
msapplication_TileColor = "#f3f3f1"

[params.fuseOpts]
isCaseSensitive = false
shouldSort = true
location = 0
distance = 1000
threshold = 0.3
minMatchCharLength = 2
keys = ["title", "summary", "content"]

[[menu.main]]
identifier = "blog"
name = "Blog"
url = "/posts/"
weight = 10

[[menu.main]]
identifier = "about"
name = "About Me"
url = "/about/"
weight = 20

[[menu.main]]
identifier = "search"
name = "Search"
url = "/search/"
weight = 30
