baseURL = "https://onurustunel.github.io/"
languageCode = "en-us"
title = "Onur Ustunel"
theme = "PaperMod"
enableRobotsTXT = true
enableGitInfo = true
summaryLength = 28

[pagination]
pagerSize = 6

[outputs]
home = ["HTML", "RSS", "JSON"]

[taxonomies]
category = "categories"
tag = "tags"

[markup.goldmark.renderer]
unsafe = true

[markup.highlight]
noClasses = false
guessSyntax = true
lineNos = false
style = "github"

[markup.tableOfContents]
startLevel = 2
endLevel = 3
ordered = false

[params]
env = "production"
author = "Onur Ustunel"
description = "Swift, SwiftUI, architecture, and performance notes from building real iOS products."
keywords = ["Swift", "SwiftUI", "iOS", "Architecture", "Performance", "Mobile Development"]
defaultTheme = "auto"
ShowReadingTime = true
ShowWordCount = true
ShowShareButtons = true
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowRssButtonInSectionTermList = true
ShowToc = true
ShowAllPagesInArchive = true
mainSections = ["posts"]
DateFormat = "January 2, 2006"

[params.homeInfoParams]
Title = "Onur Ustunel"
Content = "Writing about SwiftUI, app architecture, and performance decisions that matter in production."

[params.editPost]
URL = "https://github.com/onurustunel/onurustunel.github.io/tree/main/content"
Text = "Edit on GitHub"
appendFilePath = true

[params.assets]
disableFingerprinting = false
disableHLJS = true
theme_color = "#f7f4ec"
msapplication_TileColor = "#f7f4ec"

[params.fuseOpts]
isCaseSensitive = false
shouldSort = true
location = 0
distance = 1000
threshold = 0.3
minMatchCharLength = 2
keys = ["title", "summary", "content"]

[[params.socialIcons]]
name = "github"
url = "https://github.com/onurustunel"

[[params.socialIcons]]
name = "rss"
url = "/index.xml"

[[menu.main]]
identifier = "posts"
name = "Posts"
url = "/posts/"
weight = 10

[[menu.main]]
identifier = "archive"
name = "Archive"
url = "/archive/"
weight = 20

[[menu.main]]
identifier = "search"
name = "Search"
url = "/search/"
weight = 30

[[menu.main]]
identifier = "github"
name = "GitHub"
url = "https://github.com/onurustunel"
weight = 40
