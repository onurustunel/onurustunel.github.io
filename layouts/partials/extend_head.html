<style>
  :root {
    --theme: #f3f3f1;
    --entry: #ffffff;
    --primary: #1f1f1f;
    --secondary: #6f6b66;
    --tertiary: #e4e1dc;
    --content: #2a2a2a;
    --border: #e2dfd9;
    --code-bg: #efede9;
    --code-block-bg: #ece8e2;
    --accent: #313131;
  }

  .list {
    background: var(--theme);
  }

  .nav,
  .main {
    max-width: 1060px;
  }

  .nav {
    padding-top: 22px;
    padding-bottom: 10px;
  }

  .logo a,
  #menu a,
  .home-hero-copy h1,
  .recent-entry-header h3,
  .post-title,
  .post-content h1,
  .post-content h2,
  .post-content h3 {
    letter-spacing: -0.03em;
  }

  #menu {
    gap: 28px;
  }

  #menu a {
    font-size: 18px;
    font-weight: 600;
  }

  #menu .menu-theme-toggle {
    display: inline-flex;
    align-items: center;
    margin-inline-start: 2px;
  }

  #menu .menu-theme-toggle button#theme-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 34px;
    height: 34px;
    margin: 0;
    padding: 0;
    color: var(--primary);
    background: var(--entry);
    border: 1px solid var(--border);
    border-radius: 999px;
    line-height: 1;
  }

  #menu .menu-theme-toggle button#theme-toggle:hover {
    background: var(--code-bg);
  }

  #menu .menu-theme-toggle button#theme-toggle svg {
    display: block;
  }

  #menu .menu-theme-toggle button#theme-toggle #moon,
  #menu .menu-theme-toggle button#theme-toggle #sun {
    width: 18px;
    height: 18px;
  }

  .main .home-hero {
    min-height: auto;
    padding: 56px 0 36px;
    text-align: center;
  }

  .home-hero-avatar {
    width: 124px;
    height: 124px;
    margin: 0 auto 22px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    background: linear-gradient(135deg, #1f2937, #6b7280);
    color: #fff;
    font-size: 42px;
    font-weight: 700;
  }

  .home-hero-copy h1 {
    margin: 0;
    font-size: clamp(40px, 6vw, 64px);
    line-height: 0.95;
  }

  .home-hero-copy p {
    margin: 10px 0 0;
    color: var(--secondary);
    font-size: 18px;
  }

  .home-hero-social .social-icons {
    justify-content: center;
    margin-top: 14px;
  }

  .recent-section {
    padding: 28px 0 0;
  }

  .recent-header h2 {
    margin: 0 0 24px;
    font-size: 44px;
    letter-spacing: -0.04em;
  }

  .recent-list {
    display: flex;
    flex-direction: column;
    gap: 22px;
  }

  .recent-entry {
    position: relative;
    display: grid;
    grid-template-columns: 180px minmax(0, 1fr);
    gap: 22px;
    align-items: start;
    padding: 0;
    background: transparent;
    border: 0;
    box-shadow: none;
  }

  .recent-thumb {
    aspect-ratio: 1.2 / 0.82;
    overflow: hidden;
    border-radius: 14px;
    background: #ddd8d1;
  }

  .recent-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .recent-body {
    padding-top: 6px;
  }

  .recent-entry-header h3 {
    margin: 0 0 8px;
    font-size: 22px;
    line-height: 1.2;
  }

  .recent-entry-summary {
    margin: 0 0 8px;
    color: var(--secondary);
    font-size: 15px;
    line-height: 1.65;
  }

  .recent-entry-summary p {
    margin: 0;
  }

  .recent-entry-footer,
  .entry-footer,
  .post-meta {
    color: var(--secondary);
    font-size: 15px;
  }

  .page-header,
  .post-header {
    margin-bottom: 26px;
  }

  .post-entry,
  .first-entry,
  .archive-entry,
  .toc {
    border: 1px solid var(--border);
    box-shadow: none;
  }

  .post-entry:hover,
  .post-entry:active {
    transform: none;
  }

  .post-content {
    font-size: 17px;
    line-height: 1.85;
  }

  .post-content blockquote {
    border-inline-start: 3px solid var(--primary);
    background: #ece8e2;
  }

  #searchbox input {
    padding: 8px 12px;
    width: 100%;
    color: var(--primary);
    font-size: 16px;
    font-weight: 500;
    line-height: 1.4;
    border: 2px solid var(--tertiary);
    border-radius: var(--radius);
    background: var(--entry);
  }

  #searchbox input::placeholder {
    color: var(--secondary);
    font-weight: 400;
  }

  #searchbox input:focus {
    border-color: var(--secondary);
  }

  #searchResults li {
    list-style: none;
    border-radius: var(--radius);
    padding: 10px;
    margin: 10px 0;
    position: relative;
    font-size: 15px;
    font-weight: 500;
    line-height: 1.5;
  }

  #searchResults .entry-header {
    font-size: 15px;
    line-height: 1.5;
  }

  #searchResults {
    margin: 10px 0;
    width: 100%;
  }

  #searchResults li:active {
    transition: transform 0.1s;
    transform: scale(0.98);
  }

  #searchResults a {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0px;
    left: 0px;
    outline: none;
  }

  #searchResults .focus {
    transform: scale(0.98);
    border: 2px solid var(--tertiary);
  }

  @media (max-width: 720px) {
    .main .home-hero {
      padding-top: 34px;
    }

    .recent-header h2 {
      font-size: 34px;
    }

    .recent-entry {
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .recent-thumb {
      max-width: 240px;
    }
  }
</style>
